<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>问道·红尘劫 | 修仙闯关</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a2a1f 0%, #0e1a0c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', monospace;
            padding: 20px;
            margin: 0;
        }
        .game-container {
            max-width: 550px;
            width: 100%;
            background: #fef3df;
            border-radius: 48px;
            padding: 20px;
            border: 1px solid #dbbc7c;
            transition: transform 0.1s;
        }
        .game-container.shake { animation: shake 0.3s ease-in-out 0s 2; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
        
        .lightning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; background: rgba(255,255,255,0); z-index: 999;
            transition: background 0.05s;
        }
        .lightning.flash { background: rgba(255,255,200,0.7); }
        
        .title { text-align: center; border-bottom: 2px solid #c9a458; padding-bottom: 8px; margin-bottom: 18px; }
        .title h1 { font-size: 1.8rem; margin: 0; color: #c9863a; }
        .sound-btn {
            background: #5f4230; border: none; padding: 4px 12px; border-radius: 30px;
            color: #ffdfaa; font-size: 0.65rem; cursor: pointer; margin-bottom: 10px;
        }
        .sound-btn.active { background: #7c9a4a; color: white; }
        .stats-bar { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #2c261c; border-radius: 40px; padding: 6px 12px; flex: 1; text-align: center; }
        .stat-label { font-size: 0.6rem; color: #dbbc7c; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #f7e5b5; }
        .stat-card.pulse { transform: scale(1.05); background: #4a3a28; }
        .realm-container, .fire-container { margin-bottom: 18px; }
        .bar-bg { background: #2c241a; border-radius: 30px; height: 18px; overflow: hidden; }
        .realm-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #5fa83d, #e7b42c); border-radius: 30px; transition: width 0.2s; }
        .fire-bar-fill { width: 50%; height: 100%; background: linear-gradient(90deg, #ff8c42, #ff5e00); border-radius: 30px; transition: width 0.2s; }
        .current-realm { text-align: center; font-size: 0.75rem; margin-top: 5px; color: #bc8f4b; }
        .companion-section { background: #e6dbbc; border-radius: 28px; padding: 8px 12px; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: bold; }
        .materials { background: #e6dbbc; border-radius: 28px; padding: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; gap: 8px; }
        .material { background: #fef0cf; border-radius: 30px; padding: 4px 10px; font-size: 0.7rem; font-weight: bold; flex: 1; text-align: center; }
        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1; background: #f3e5c0; border: none; padding: 10px 6px; border-radius: 60px;
            font-weight: bold; font-family: inherit; font-size: 0.85rem; cursor: pointer;
            box-shadow: 0 3px 0 #b48b4b; transition: 0.05s;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #b48b4b; }
        .btn-pulse { animation: btnPulse 0.15s ease-out; }
        @keyframes btnPulse { 0%{transform:scale(1);} 50%{transform:scale(0.95);} 100%{transform:scale(1);} }
        .btn-primary { background: #c9a25d; }
        .btn-danger { background: #c9784a; color: white; }
        .btn-warning { background: #7c9a4a; color: white; }
        .disabled-btn { opacity: 0.5; pointer-events: none; }
        .log-area { background: #1e1912; border-radius: 24px; padding: 10px; height: 110px; overflow-y: auto; font-size: 0.65rem; color: #e7cf97; margin-top: 12px; }
        .reset-btn { margin-top: 16px; width: 100%; background: #5f4230; border: none; padding: 10px; border-radius: 60px; color: #ffdfaa; font-weight: bold; cursor: pointer; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .choice-modal, .result-modal {
            background: #fef0da; max-width: 420px; width: 85%;
            border-radius: 48px; padding: 20px; text-align: center; border: 2px solid #ecc284;
        }
        .choice-modal h3 { color: #8b4b1a; font-size: 1.5rem; margin-bottom: 15px; }
        .choice-desc { background: #2c261c; color: #ffefbf; padding: 15px; border-radius: 36px; margin: 15px 0; font-size: 0.9rem; }
        .choice-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .choice-btn { background: #ba8750; padding: 8px 20px; border-radius: 40px; font-weight: bold; color: white; cursor: pointer; border: none; font-size: 0.9rem; }
        .modal-stats { text-align: left; background: #2c261c; border-radius: 28px; padding: 12px; color: #f7e5b5; margin: 15px 0; font-size: 0.8rem; }
        .hidden { display: none; }
        
        .float-number {
            position: fixed; font-size: 1.2rem; font-weight: bold; pointer-events: none;
            z-index: 10000; animation: floatUp 0.8s ease-out forwards; text-shadow: 0 0 3px black;
        }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-50px);} }
        .result-pop {
            position: fixed; bottom: 30%; left: 50%; transform: translateX(-50%);
            background: #2c261c; padding: 8px 20px; border-radius: 40px;
            color: #ffdfaa; font-weight: bold; z-index: 1000;
            animation: fadeOut 1.5s ease-out forwards;
        }
        @keyframes fadeOut { 0%{opacity:1;} 70%{opacity:1;} 100%{opacity:0;} }
    </style>
</head>
<body>
<div class="lightning" id="lightning"></div>
<div class="game-container" id="gameContainer">
    <button class="sound-btn" id="soundBtn">🔇 开启声音</button>
    <div class="title"><h1>问道·红尘劫</h1><p>｜ 修仙问道 逆天改命 ｜</p></div>

    <div class="stats-bar">
        <div class="stat-card" id="cultStat"><div class="stat-label">🧘 修为</div><div class="stat-value" id="cultVal">0</div></div>
        <div class="stat-card" id="fireStat"><div class="stat-label">🔥 炉火</div><div class="stat-value" id="fireVal">50</div></div>
        <div class="stat-card" id="turnStat"><div class="stat-label">⏰ 回合</div><div class="stat-value" id="turnVal">14</div></div>
        <div class="stat-card"><div class="stat-label">⚡ 境界</div><div class="stat-value" id="realmVal">1/9</div></div>
    </div>

    <div class="realm-container">
        <div style="display:flex; justify-content:space-between;"><span>境界进度</span><span id="progressText">0/100</span></div>
        <div class="bar-bg"><div class="realm-bar-fill" id="realmBar"></div></div>
        <div class="current-realm" id="realmName">⚡ 炼气期 ⚡</div>
    </div>

    <div class="fire-container">
        <div style="display:flex; justify-content:space-between;"><span>🔥 炉火温度</span><span id="fireStatus">温热适中</span></div>
        <div class="bar-bg"><div class="fire-bar-fill" id="fireBar"></div></div>
    </div>

    <div class="companion-section">
        <span>💑 道侣：<span id="companionText">暂无</span></span>
        <span>✨ 仙缘：<span id="immortalText">未遇</span></span>
    </div>

    <div class="materials">
        <div class="material">🌿 灵草: <span id="herbCount">6</span></div>
        <div class="material">💎 矿石: <span id="oreCount">5</span></div>
        <div class="material">🔥 兽血: <span id="bloodCount">3</span></div>
    </div>

    <div class="action-buttons">
        <div class="btn-group"><button class="btn" id="exploreBtn">🌲 探索</button><button class="btn btn-primary" id="alchemyBtn">⚗️ 炼丹</button></div>
        <div class="btn-group"><button class="btn btn-warning" id="heatBtn">🔥 升温</button><button class="btn btn-warning" id="coolBtn">❄️ 降温</button><button class="btn btn-danger" id="breakBtn">✨ 渡劫</button></div>
    </div>

    <div class="log-area" id="logArea">> 点击「开启声音」激活音效<br>> 炉火最佳区间45-65°C<br>> 探索可能触发奇遇事件<br>> 稳扎稳打，总能通关！</div>
    <button class="reset-btn" id="resetBtn">🔄 轮回重生</button>
</div>

<div id="branchModal" class="modal-overlay hidden"><div class="choice-modal"><h3 id="branchTitle">天命抉择</h3><div id="branchDesc" class="choice-desc"></div><div id="branchBtns" class="choice-buttons"></div></div></div>
<div id="resultModal" class="modal-overlay hidden"><div class="result-modal"><h2 id="resultTitle">🏆 飞升成圣</h2><div id="resultStats" class="modal-stats"></div><button id="closeResult" class="choice-btn">轮回再修</button></div></div>

<script>
    // ========== 平衡难度：保证能通关 ==========
    const REALMS = ["炼气期","筑基期","结丹期","元婴期","化神期","渡劫期","大乘期","真仙境","金仙境"];
    // 回合数：前期充足，后期够用
    const TURN_LIMITS = [14, 13, 12, 12, 11, 10, 10, 9, 20];
    // 死亡率：有挑战但不绝望
    const DEATH_RATES = [0.05, 0.08, 0.12, 0.18, 0.25, 0.35, 0.45, 0.55, 0];

    let game = {
        realm:0, cult:0, fire:50, herbs:6, ores:5, blood:3,
        turns:TURN_LIMITS[0], over:false, win:false, deathMsg:"",
        hasCompanion:false, hasImmortal:false, totalActions:0
    };

    // 音效系统
    let audioEnabled = false, audioCtx = null;
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
    function playSound(type) {
        if(!audioEnabled) return;
        try {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type==='click'){ osc.frequency.value=800; gain.gain.setValueAtTime(0.05,now); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.08); osc.start(); osc.stop(now+0.08); }
            if(type==='success'){ osc.frequency.value=523; gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.25); osc.start(); osc.stop(now+0.25); }
            if(type==='fail'){ osc.frequency.value=220; gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.35); osc.start(); osc.stop(now+0.35); }
            if(type==='break'){ osc.frequency.value=659; gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.4); osc.start(); osc.stop(now+0.4); }
            if(type==='death'){ osc.frequency.value=150; gain.gain.setValueAtTime(0.15,now); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.7); osc.start(); osc.stop(now+0.7); }
        } catch(e) {}
    }

    // DOM
    const cultSpan=document.getElementById("cultVal"), fireSpan=document.getElementById("fireVal"), turnSpan=document.getElementById("turnVal");
    const realmSpan=document.getElementById("realmVal"), progressText=document.getElementById("progressText"), realmBar=document.getElementById("realmBar");
    const realmNameSpan=document.getElementById("realmName"), fireStatusSpan=document.getElementById("fireStatus"), fireBar=document.getElementById("fireBar");
    const herbSpan=document.getElementById("herbCount"), oreSpan=document.getElementById("oreCount"), bloodSpan=document.getElementById("bloodCount");
    const companionSpan=document.getElementById("companionText"), immortalSpan=document.getElementById("immortalText");
    const logArea=document.getElementById("logArea");
    const branchModal=document.getElementById("branchModal"), branchTitle=document.getElementById("branchTitle");
    const branchDesc=document.getElementById("branchDesc"), branchBtns=document.getElementById("branchBtns");
    const resultModal=document.getElementById("resultModal"), resultTitle=document.getElementById("resultTitle");
    const resultStats=document.getElementById("resultStats"), closeResult=document.getElementById("closeResult");
    const exploreBtn=document.getElementById("exploreBtn"), alchemyBtn=document.getElementById("alchemyBtn");
    const heatBtn=document.getElementById("heatBtn"), coolBtn=document.getElementById("coolBtn");
    const breakBtn=document.getElementById("breakBtn"), resetBtn=document.getElementById("resetBtn");
    const soundBtn=document.getElementById("soundBtn");
    const gameContainer=document.getElementById("gameContainer");
    const lightning=document.getElementById("lightning");

    function showResultPopup(msg, isGood) {
        let div = document.createElement("div");
        div.className = "result-pop";
        div.innerHTML = msg;
        div.style.background = isGood ? "#2c5a2c" : "#5a2a1c";
        document.body.appendChild(div);
        setTimeout(()=>div.remove(), 1500);
    }

    function animateStat(statId, delta, isPositive) {
        let statDiv = document.getElementById(statId);
        if(statDiv) { statDiv.classList.add('pulse'); setTimeout(()=>statDiv.classList.remove('pulse'),200); }
        let floatDiv = document.createElement('div');
        floatDiv.className = 'float-number';
        floatDiv.style.left = (window.innerWidth/2)+'px';
        floatDiv.style.top = (window.innerHeight/2-50)+'px';
        floatDiv.style.color = isPositive ? '#aaffaa' : '#ffaa88';
        floatDiv.innerHTML = (isPositive?'+':'')+delta;
        document.body.appendChild(floatDiv);
        setTimeout(()=>floatDiv.remove(),800);
    }

    function addLog(msg, isErr) {
        let p = document.createElement("div");
        p.innerHTML = (isErr ? "⚠️ " : "✨ ") + msg;
        logArea.appendChild(p);
        p.scrollIntoView({ behavior: "smooth", block: "nearest" });
        while(logArea.children.length>18) logArea.removeChild(logArea.firstChild);
    }

    function updateUI() {
        cultSpan.innerText=game.cult; fireSpan.innerText=game.fire; turnSpan.innerText=game.turns;
        realmSpan.innerText=`${game.realm+1}/${REALMS.length}`;
        let percent=(game.cult/100)*100;
        realmBar.style.width=percent+"%";
        progressText.innerText=game.cult+"/100";
        if(game.win) realmNameSpan.innerHTML="⭐ 飞升成圣 ⭐";
        else if(game.over) realmNameSpan.innerHTML="💀 身死道消 💀";
        else realmNameSpan.innerHTML=`⚡ ${REALMS[game.realm]} ⚡`;
        fireBar.style.width=game.fire+"%";
        if(game.fire<25) fireStatusSpan.innerText="❄️ 冰寒";
        else if(game.fire<45) fireStatusSpan.innerText="🌡️ 偏冷";
        else if(game.fire<=65) fireStatusSpan.innerText="🔥 真火";
        else if(game.fire<=85) fireStatusSpan.innerText="🌋 烈焰";
        else fireStatusSpan.innerText="💀 焚天";
        herbSpan.innerText=game.herbs; oreSpan.innerText=game.ores; bloodSpan.innerText=game.blood;
        companionSpan.innerText=game.hasCompanion?"❤️ 相伴":"暂无";
        immortalSpan.innerText=game.hasImmortal?"✨ 有缘":"未遇";
        let d=game.over||game.win;
        exploreBtn.disabled=d; alchemyBtn.disabled=d; heatBtn.disabled=d; coolBtn.disabled=d; breakBtn.disabled=d;
    }

    function consumeTurn() {
        if(game.over||game.win) return false;
        game.turns--; game.totalActions++;
        updateUI();
        if(game.turns<=0 && game.cult<100 && !game.over && !game.win) die("道心崩溃，未能突破...");
        return true;
    }

    function die(msg) {
        if(game.over||game.win) return;
        game.over=true; game.deathMsg=msg;
        addLog(msg,true); playSound('death');
        gameContainer.classList.add('shake'); setTimeout(()=>gameContainer.classList.remove('shake'),300);
        updateUI();
        resultTitle.innerText="💀 身死道消 💀";
        resultStats.innerHTML=`<p>最终境界：${REALMS[game.realm]}</p><p>总行动：${game.totalActions}</p><p>道侣：${game.hasCompanion?"是":"否"}</p><p>仙缘：${game.hasImmortal?"是":"否"}</p><p>结局：${msg.substring(0,40)}</p>`;
        resultModal.classList.remove("hidden");
    }

    function winGame() {
        game.win=true; playSound('break');
        lightning.classList.add('flash'); setTimeout(()=>lightning.classList.remove('flash'),200);
        updateUI();
        resultTitle.innerText="🏆 飞升成圣 🏆";
        resultStats.innerHTML=`<p>最终境界：金仙境</p><p>总行动：${game.totalActions}</p><p>道侣：${game.hasCompanion?"是":"否"}</p><p>仙缘：${game.hasImmortal?"是":"否"}</p><p>功德圆满，超脱三界！</p>`;
        resultModal.classList.remove("hidden");
    }

    // 分支事件弹窗
    function showBranchEvent(eventObj, callback) {
        branchTitle.innerText = eventObj.title;
        branchDesc.innerText = eventObj.desc;
        branchBtns.innerHTML = "";
        eventObj.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.innerText = opt.text;
            btn.className = "choice-btn";
            btn.onclick = () => {
                branchModal.classList.add("hidden");
                callback(opt);
            };
            branchBtns.appendChild(btn);
        });
        branchModal.classList.remove("hidden");
    }

    // 奇遇事件池
    const MYSTIC_EVENTS = [
        { title: "🌊 上古秘境", desc: "你发现一座上古洞府，有两件宝物可选：",
          options: [{ text: "📖 天书 (+15修为)", effect: (g)=>{ g.cult=Math.min(100,g.cult+15); showResultPopup("修为+15！",true); } },
                     { text: "🔥 控火诀 (炉火稳定)", effect: (g)=>{ g.fire=55; showResultPopup("炉火重置为55°C",true); } }] },
        { title: "💕 红尘劫", desc: "一位神秘女子愿与你结为道侣：",
          options: [{ text: "💑 结为道侣 (+8%炼丹)", effect: (g)=>{ if(!g.hasCompanion){ g.hasCompanion=true; g.turns+=1; showResultPopup("结为道侣，炼丹+8%",true); } } },
                     { text: "🚫 拒绝 (+10修为)", effect: (g)=>{ g.cult=Math.min(100,g.cult+10); showResultPopup("修为+10",true); } }] },
        { title: "⚡ 雷劫奇遇", desc: "天降异象，你该如何选择？",
          options: [{ text: "🌈 引雷淬体 (风险小)", effect: (g)=>{ if(Math.random()<0.15) die("引雷失败..."); else{ g.cult=Math.min(100,g.cult+20); showResultPopup("淬体成功！修为+20",true); } } },
                     { text: "🌀 躲避观望 (+2回合)", effect: (g)=>{ g.turns+=2; showResultPopup("获得2回合",true); } }] },
        { title: "🍵 神秘老人", desc: "一位老仙人向你卖丹药：",
          options: [{ text: "💰 购买灵丹 (消耗3灵草)", effect: (g)=>{ if(g.herbs>=3){ g.herbs-=3; g.cult=Math.min(100,g.cult+18); showResultPopup("服用灵丹，修为+18",true); } else showResultPopup("灵草不足！",false); } },
                     { text: "🙏 虚心请教", effect: (g)=>{ g.cult=Math.min(100,g.cult+8); showResultPopup("修为+8",true); } }] }
    ];

    function tryTriggerEvent() {
        if(Math.random()<0.12 && !game.over && !game.win) {
            let ev = MYSTIC_EVENTS[Math.floor(Math.random()*MYSTIC_EVENTS.length)];
            showBranchEvent(ev, (choice) => {
                choice.effect(game);
                playSound('success');
                updateUI();
                consumeTurn();
            });
            return true;
        }
        return false;
    }

    function getAlchemyRate() { 
        let t=game.fire; 
        let base=70;
        if(t<25) base=30;
        else if(t<45) base=55;
        else if(t<=65) base=82;
        else if(t<=85) base=60;
        else base=35;
        if(game.hasCompanion) base+=8;
        return Math.min(92,Math.max(20,base));
    }
    
    function getAlchemyGain() { 
        let base=14+Math.floor(Math.random()*16); 
        let t=game.fire; 
        let mul=1;
        if(t>=45&&t<=65) mul=1;
        else if(t>=35) mul=0.75;
        else mul=0.6;
        if(game.hasImmortal) mul+=0.2;
        return Math.max(5,Math.floor(base*mul)); 
    }

    function alchemy() {
        if(game.over||game.win) return;
        playSound('click');
        if(game.herbs<2||game.ores<1){ addLog("材料不足",true); return; }
        game.herbs-=2; game.ores-=1;
        if(Math.random()*100<getAlchemyRate()) {
            let gain=getAlchemyGain();
            game.cult=Math.min(100,game.cult+gain);
            addLog(`炼丹成功！修为+${gain}`,false);
            animateStat('cultStat',gain,true);
            showResultPopup(`修为 +${gain}`,true);
            playSound('success');
            let delta=Math.floor(Math.random()*5)-2;
            game.fire=Math.min(100,Math.max(0,game.fire+delta));
        } else {
            let loss=5+Math.floor(Math.random()*10);
            game.cult=Math.max(0,game.cult-loss);
            addLog(`炼丹失败！修为-${loss}`,true);
            animateStat('cultStat',loss,false);
            showResultPopup(`修为 -${loss}`,false);
            playSound('fail');
            let fluct=4+Math.floor(Math.random()*8);
            game.fire=Math.min(100,Math.max(0,game.fire+(Math.random()>0.5?fluct:-fluct)));
            if(game.fire>92 && Math.random()<0.15) die("丹炉爆炸而亡...");
        }
        updateUI();
        consumeTurn();
    }

    function explore() {
        if(game.over||game.win) return;
        playSound('click');
        if(tryTriggerEvent()) return;
        let r=Math.random();
        if(r<0.15 && !game.hasCompanion){
            game.hasCompanion=true; addLog("💕 邂逅道侣！炼丹+8%",false); game.turns+=1; playSound('success');
            showResultPopup("结为道侣！",true);
        } else if(r<0.28 && !game.hasImmortal){
            game.hasImmortal=true; addLog("✨ 遇仙缘！收益+30%",false); game.cult=Math.min(100,game.cult+10); game.turns+=1; playSound('success');
            showResultPopup("得仙人指点！",true);
        } else if(r<0.60){
            let h=2+Math.floor(Math.random()*7), o=1+Math.floor(Math.random()*6);
            game.herbs+=h; game.ores+=o;
            addLog(`收获灵草+${h}，矿石+${o}`,false);
            showResultPopup(`灵草+${h} 矿石+${o}`,true);
            playSound('success');
        } else if(r<0.80){
            let g=8+Math.floor(Math.random()*14);
            game.cult=Math.min(100,game.cult+g);
            addLog(`顿悟！修为+${g}`,false);
            animateStat('cultStat',g,true);
            showResultPopup(`修为 +${g}`,true);
            playSound('success');
        } else {
            let loss=5+Math.floor(Math.random()*8);
            addLog("遭遇妖兽！修为-"+loss,true);
            game.cult=Math.max(0,game.cult-loss);
            animateStat('cultStat',loss,false);
            showResultPopup(`修为 -${loss}`,false);
            if(game.cult<5&&Math.random()<0.15) die("被妖兽重伤而死...");
        }
        updateUI();
        consumeTurn();
    }

    function adjustTemp(up) {
        if(game.over||game.win) return;
        playSound('click');
        let delta=up?10:-10;
        game.fire=Math.min(100,Math.max(0,game.fire+delta));
        addLog(up?"炉火+10":"炉火-10",false);
        showResultPopup(up?"炉火 +10":"炉火 -10",true);
        updateUI();
        consumeTurn();
    }

    function breakthrough() {
        if(game.over||game.win) return;
        playSound('click');
        if(game.cult<100){ addLog(`修为不足${game.cult}/100`,true); return; }
        if(game.realm>=REALMS.length-1){ winGame(); return; }
        let rate=DEATH_RATES[game.realm];
        if(game.hasCompanion) rate=Math.max(0,rate-0.03);
        let successRate = Math.floor((1-rate)*100);
        showResultPopup(`渡劫成功率：${successRate}%`, rate<0.5);
        if(Math.random()<rate){
            die(`渡劫失败！${REALMS[game.realm]}突破时身死...`);
            return;
        }
        game.realm++;
        game.cult=0;
        game.fire=55;
        game.turns=TURN_LIMITS[game.realm];
        if(game.hasCompanion) game.turns+=1;
        if(game.hasImmortal) game.turns+=2;
        addLog(`🎉 渡劫成功！晋升${REALMS[game.realm]}`,false);
        showResultPopup(`突破至 ${REALMS[game.realm]}！`,true);
        playSound('break');
        lightning.classList.add('flash'); setTimeout(()=>lightning.classList.remove('flash'),150);
        updateUI();
        consumeTurn();
    }

    function reset() {
        game={ realm:0, cult:0, fire:50, herbs:6, ores:5, blood:3, turns:TURN_LIMITS[0], over:false, win:false, deathMsg:"", hasCompanion:false, hasImmortal:false, totalActions:0 };
        logArea.innerHTML="> 点击「开启声音」激活音效<br>> 炉火最佳区间45-65°C<br>> 探索可能触发奇遇事件<br>> 稳扎稳打，总能通关！";
        updateUI();
        addLog("轮回重生，道心重燃",false);
        resultModal.classList.add("hidden");
        branchModal.classList.add("hidden");
    }

    soundBtn.onclick=()=>{ initAudio(); audioEnabled=true; soundBtn.innerText="🔊 声音已开"; soundBtn.classList.add("active"); playSound('success'); addLog("音效已开启！",false); };
    exploreBtn.onclick=explore; alchemyBtn.onclick=alchemy; heatBtn.onclick=()=>adjustTemp(true); coolBtn.onclick=()=>adjustTemp(false);
    breakBtn.onclick=breakthrough; resetBtn.onclick=reset; closeResult.onclick=()=>{ resultModal.classList.add("hidden"); reset(); };
    reset();
</script>
</body>
</html>
