<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>问道·红尘劫 | 修仙闯关游戏</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a2a1f 0%, #0e1a0c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', monospace;
            padding: 20px;
            margin: 0;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
            background: #fef3df;
            background-image: radial-gradient(circle at 20% 30%, rgba(160, 120, 70, 0.08) 2%, transparent 2.5%);
            background-size: 26px 26px;
            border-radius: 48px 40px 56px 44px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 3px #fff8e7;
            padding: 20px 22px 28px;
            border: 1px solid #dbbc7c;
        }

        .title {
            text-align: center;
            border-bottom: 2px solid #c9a458;
            padding-bottom: 8px;
            margin-bottom: 18px;
        }

        .title h1 {
            font-size: 1.9rem;
            margin: 0;
            background: linear-gradient(135deg, #3c7846, #c9863a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 4px;
        }

        .title p {
            color: #7b5a36;
            font-size: 0.65rem;
            margin-top: 4px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #2c261c;
            border-radius: 40px;
            padding: 8px 16px;
            flex: 1;
            text-align: center;
            box-shadow: inset 0 1px 2px #5f4a2e, 0 3px 6px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-size: 0.65rem;
            color: #dbbc7c;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #f7e5b5;
            line-height: 1.2;
        }

        .danger-timer .stat-value {
            color: #ff8866;
        }

        .realm-container {
            margin-bottom: 20px;
        }
        .realm-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #6b4e2a;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .bar-bg {
            background: #2c241a;
            border-radius: 30px;
            height: 20px;
            overflow: hidden;
        }
        .realm-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #5fa83d, #e7b42c);
            border-radius: 30px;
            transition: width 0.2s;
        }
        .current-realm {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 5px;
            color: #bc8f4b;
            font-weight: bold;
        }

        .fire-container {
            margin-bottom: 20px;
        }
        .fire-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: bold;
            color: #9b5a2a;
        }
        .fire-bar-bg {
            background: #2a1f14;
            border-radius: 30px;
            height: 14px;
        }
        .fire-bar-fill {
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #ff8c42, #ff5e00);
            border-radius: 30px;
            transition: width 0.2s;
        }
        .fire-tip {
            font-size: 0.55rem;
            color: #b87a3a;
            margin-top: 4px;
            text-align: center;
        }

        .companion-section {
            background: #e6dbbc;
            border-radius: 28px;
            padding: 8px 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .materials {
            background: #e6dbbc;
            border-radius: 28px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .material {
            background: #fef0cf;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #5e3a1f;
            flex: 1;
            text-align: center;
        }
        .material span {
            color: #c27e2a;
            font-size: 1rem;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            background: #f3e5c0;
            border: none;
            padding: 12px 8px;
            border-radius: 60px;
            font-weight: bold;
            font-family: inherit;
            font-size: 0.9rem;
            color: #4a3020;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #b48b4b;
            text-align: center;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b48b4b;
        }
        .btn-primary {
            background: #c9a25d;
            color: #2b2118;
        }
        .btn-danger {
            background: #c9784a;
            color: white;
        }
        .btn-warning {
            background: #7c9a4a;
            color: white;
        }
        .disabled-btn {
            opacity: 0.5;
            pointer-events: none;
        }

        .log-area {
            background: #1e1912;
            border-radius: 24px;
            padding: 10px;
            height: 130px;
            overflow-y: auto;
            font-size: 0.68rem;
            font-family: monospace;
            color: #e7cf97;
            margin-top: 12px;
        }

        .reset-btn {
            margin-top: 16px;
            width: 100%;
            background: #5f4230;
            border: none;
            padding: 10px;
            border-radius: 60px;
            color: #ffdfaa;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: linear-gradient(145deg, #fef0da, #f5e5c8);
            max-width: 400px;
            width: 90%;
            border-radius: 48px;
            padding: 28px 22px;
            text-align: center;
            box-shadow: 0 20px 40px black;
            border: 2px solid #e9c27c;
        }
        .modal-content h2 {
            color: #8b5a2b;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .modal-stats {
            text-align: left;
            background: #2c261c;
            border-radius: 28px;
            padding: 15px;
            color: #f7e5b5;
            margin: 15px 0;
        }
        .modal-stats p {
            margin: 8px 0;
        }
        .modal-btn {
            background: #c9a25d;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .hidden {
            display: none;
        }

        footer {
            font-size: 0.5rem;
            text-align: center;
            margin-top: 12px;
            color: #ad8a55;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="title">
        <h1>问 道 · 红 尘 劫</h1>
        <p>｜ 九死一生 逆天改命 ｜</p>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><div class="stat-label">🧘 修为</div><div class="stat-value" id="cultivationVal">0</div></div>
        <div class="stat-card"><div class="stat-label">🔥 炉火</div><div class="stat-value" id="fireVal">50</div></div>
        <div class="stat-card danger-timer"><div class="stat-label">⏰ 剩余回合</div><div class="stat-value" id="turnLeft">7</div></div>
        <div class="stat-card"><div class="stat-label">⚡ 境界</div><div class="stat-value" id="realmIndex">1/9</div></div>
    </div>

    <div class="realm-container">
        <div class="realm-label"><span>境界进度</span><span id="realmProgressText">0 / 100</span></div>
        <div class="bar-bg"><div class="realm-bar-fill" id="realmBar"></div></div>
        <div class="current-realm" id="currentRealm">⚡ 炼气期 ⚡</div>
    </div>

    <div class="fire-container">
        <div class="fire-header"><span>🔥 炉火温度</span><span id="fireStatus">温热适中</span></div>
        <div class="bar-bg"><div class="fire-bar-fill" id="fireFill"></div></div>
        <div class="fire-tip">🌡️ 最佳区间:45-65°C | 偏离惩罚极重</div>
    </div>

    <div class="companion-section">
        <span>💑 道侣：</span>
        <span id="companionStatus">❤️ 暂无</span>
        <span>✨ 仙缘：</span>
        <span id="immortalStatus">🌙 未遇</span>
    </div>

    <div class="materials">
        <div class="material">🌿 灵草: <span id="herbCount">3</span></div>
        <div class="material">💎 矿石: <span id="oreCount">3</span></div>
        <div class="material">🔥 兽血: <span id="bloodCount">2</span></div>
    </div>

    <div class="action-buttons">
        <div class="btn-group">
            <button class="btn" id="exploreBtn">🌲 神识探索</button>
            <button class="btn btn-primary" id="alchemyBtn">⚗️ 炼丹</button>
        </div>
        <div class="btn-group">
            <button class="btn btn-warning" id="adjustFireUp">🔥 + 升温</button>
            <button class="btn btn-warning" id="adjustFireDown">❄️ - 降温</button>
            <button class="btn btn-danger" id="breakthroughBtn">✨ 渡劫突破</button>
        </div>
    </div>

    <div class="log-area" id="logArea">
        > 天道残酷，每一步都关乎生死！<br>
        > 每境仅有少量回合，必须极限操作。<br>
        > 炉火偏离最佳区间会严重惩罚炼丹。<br>
        > 寻找道侣/仙缘是唯一生机。
    </div>
    <button class="reset-btn" id="resetBtn">🔄 轮回重生</button>
    <footer>※ 高难度硬核修仙 | 挑战飞升九境 ※</footer>
</div>

<div id="resultModal" class="modal hidden">
    <div class="modal-content">
        <h2 id="modalTitle">🏆 飞升成圣 🏆</h2>
        <div class="modal-stats" id="modalStats"></div>
        <button class="modal-btn" id="closeModal">轮回再修</button>
    </div>
</div>

<script>
    // 境界列表
    const REALMS = ["炼气期", "筑基期", "结丹期", "元婴期", "化神期", "渡劫期", "大乘期", "真仙境", "金仙境"];
    // 每境基础回合限制（高难度）
    const TURN_LIMITS = [7, 8, 9, 10, 11, 12, 13, 14, 18];
    // 每境渡劫死亡率
    const DEATH_RATES = [0.18, 0.26, 0.35, 0.45, 0.55, 0.65, 0.75, 0.85, 0.0];

    let game = {
        realmIdx: 0,
        cultivation: 0,
        fireTemp: 50,
        herbs: 3,
        ores: 3,
        blood: 2,
        turnsLeft: TURN_LIMITS[0],
        gameOver: false,
        gameWin: false,
        deathCause: "",
        hasCompanion: false,
        companionBonus: 0,
        hasImmortal: false,
        immortalBonus: 0,
        totalTurnsUsed: 0
    };

    // DOM 元素
    const cultivationVal = document.getElementById("cultivationVal");
    const fireVal = document.getElementById("fireVal");
    const turnLeftSpan = document.getElementById("turnLeft");
    const realmIndexSpan = document.getElementById("realmIndex");
    const realmBar = document.getElementById("realmBar");
    const realmProgressText = document.getElementById("realmProgressText");
    const currentRealmSpan = document.getElementById("currentRealm");
    const fireFill = document.getElementById("fireFill");
    const fireStatusSpan = document.getElementById("fireStatus");
    const herbCountSpan = document.getElementById("herbCount");
    const oreCountSpan = document.getElementById("oreCount");
    const bloodCountSpan = document.getElementById("bloodCount");
    const companionStatusSpan = document.getElementById("companionStatus");
    const immortalStatusSpan = document.getElementById("immortalStatus");
    const logArea = document.getElementById("logArea");
    const modal = document.getElementById("resultModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalStats = document.getElementById("modalStats");
    const closeModalBtn = document.getElementById("closeModal");

    const exploreBtn = document.getElementById("exploreBtn");
    const alchemyBtn = document.getElementById("alchemyBtn");
    const adjustFireUp = document.getElementById("adjustFireUp");
    const adjustFireDown = document.getElementById("adjustFireDown");
    const breakthroughBtn = document.getElementById("breakthroughBtn");
    const resetBtn = document.getElementById("resetBtn");

    function addLog(msg, isError) {
        const p = document.createElement("div");
        p.innerHTML = (isError ? "⚠️ " : "✨ ") + msg;
        logArea.appendChild(p);
        logArea.scrollTop = logArea.scrollHeight;
        while (logArea.children.length > 22) logArea.removeChild(logArea.firstChild);
    }

    function clampValues() {
        game.cultivation = Math.min(100, Math.max(0, game.cultivation));
        game.fireTemp = Math.min(100, Math.max(0, game.fireTemp));
        game.herbs = Math.max(0, game.herbs);
        game.ores = Math.max(0, game.ores);
        game.blood = Math.max(0, game.blood);
        if (game.turnsLeft < 0) game.turnsLeft = 0;
    }

    function updateUI() {
        clampValues();
        cultivationVal.innerText = game.cultivation;
        fireVal.innerText = game.fireTemp;
        turnLeftSpan.innerText = game.turnsLeft;
        realmIndexSpan.innerText = `${game.realmIdx+1}/${REALMS.length}`;
        
        let progressPercent = (game.cultivation / 100) * 100;
        realmBar.style.width = `${progressPercent}%`;
        realmProgressText.innerText = `${game.cultivation} / 100`;
        
        if (game.gameWin) currentRealmSpan.innerHTML = "⭐ 金仙大圆满 · 飞升成圣 ⭐";
        else if (game.gameOver) currentRealmSpan.innerHTML = "💀 身死道消 · 魂归天地 💀";
        else currentRealmSpan.innerHTML = `⚡ ${REALMS[game.realmIdx]} ⚡`;
        
        fireFill.style.width = `${game.fireTemp}%`;
        if (game.fireTemp < 25) {
            fireStatusSpan.innerHTML = "❄️ 冰寒刺骨";
        } else if (game.fireTemp < 45) {
            fireStatusSpan.innerHTML = "🌡️ 微温偏冷";
        } else if (game.fireTemp <= 65) {
            fireStatusSpan.innerHTML = "🔥 赤焰真火";
        } else if (game.fireTemp <= 85) {
            fireStatusSpan.innerHTML = "🌋 烈焰翻腾";
        } else {
            fireStatusSpan.innerHTML = "💀 焚天灭地";
        }
        
        herbCountSpan.innerText = game.herbs;
        oreCountSpan.innerText = game.ores;
        bloodCountSpan.innerText = game.blood;
        
        companionStatusSpan.innerHTML = game.hasCompanion ? "❤️ 相伴" : "💔 暂无";
        immortalStatusSpan.innerHTML = game.hasImmortal ? "✨ 有缘" : "🌙 未遇";
        
        let disabled = game.gameOver || game.gameWin;
        exploreBtn.disabled = disabled;
        alchemyBtn.disabled = disabled;
        adjustFireUp.disabled = disabled;
        adjustFireDown.disabled = disabled;
        breakthroughBtn.disabled = disabled;
        if (disabled) {
            exploreBtn.classList.add("disabled-btn");
            alchemyBtn.classList.add("disabled-btn");
            adjustFireUp.classList.add("disabled-btn");
            adjustFireDown.classList.add("disabled-btn");
            breakthroughBtn.classList.add("disabled-btn");
        } else {
            exploreBtn.classList.remove("disabled-btn");
            alchemyBtn.classList.remove("disabled-btn");
            adjustFireUp.classList.remove("disabled-btn");
            adjustFireDown.classList.remove("disabled-btn");
            breakthroughBtn.classList.remove("disabled-btn");
        }
    }

    function consumeTurn() {
        if (game.gameOver || game.gameWin) return false;
        game.turnsLeft--;
        game.totalTurnsUsed++;
        if (game.turnsLeft < 0) game.turnsLeft = 0;
        updateUI();
        if (game.turnsLeft === 0 && game.cultivation < 100 && !game.gameOver && !game.gameWin) {
            die(`【道心崩溃】在${REALMS[game.realmIdx]}停留太久，未能突破，心魔侵蚀而亡...`);
            return false;
        }
        return true;
    }

    function die(cause) {
        if (game.gameOver || game.gameWin) return;
        game.gameOver = true;
        game.deathCause = cause;
        addLog(cause, true);
        updateUI();
        showResultModal(false);
    }

    function winGame() {
        game.gameWin = true;
        updateUI();
        showResultModal(true);
    }

    function showResultModal(isWin) {
        modalTitle.innerHTML = isWin ? "🏆 飞升成圣 🏆" : "💀 身死道消 💀";
        let statsHtml = `
            <p>🏁 最终境界：${isWin ? "金仙境·圆满" : REALMS[game.realmIdx]}</p>
            <p>📊 总行动次数：${game.totalTurnsUsed}</p>
            <p>💑 道侣相伴：${game.hasCompanion ? "是" : "否"}</p>
            <p>✨ 仙人指路：${game.hasImmortal ? "是" : "否"}</p>
            <p>🔥 最终炉火：${game.fireTemp}°C</p>
            <p>📜 结局：${isWin ? "功德圆满，超脱三界" : game.deathCause.substring(0, 50)}</p>
        `;
        modalStats.innerHTML = statsHtml;
        modal.classList.remove("hidden");
    }

    function getAlchemySuccessRate() {
        let base = 55;
        let temp = game.fireTemp;
        if (temp < 20) base = 8;
        else if (temp < 30) base = 18;
        else if (temp < 40) base = 32;
        else if (temp < 45) base = 48;
        else if (temp <= 65) base = 75;
        else if (temp <= 75) base = 45;
        else if (temp <= 85) base = 25;
        else base = 10;
        if (game.hasCompanion) base += 8;
        return Math.min(90, base);
    }

    function getAlchemyGain() {
        let base = 12 + Math.floor(Math.random() * 15);
        let temp = game.fireTemp;
        let multiplier = 1.0;
        if (temp >= 45 && temp <= 65) multiplier = 1.0;
        else if (temp >= 35 && temp < 45) multiplier = 0.65;
        else if (temp > 65 && temp <= 75) multiplier = 0.6;
        else if (temp > 75 && temp <= 85) multiplier = 0.45;
        else multiplier = 0.25;
        if (game.hasImmortal) multiplier += 0.25;
        return Math.max(3, Math.floor(base * multiplier));
    }

    function alchemy() {
        if (game.gameOver || game.gameWin) return;
        if (game.herbs < 2 || game.ores < 1) {
            addLog("材料不足！需要2灵草+1矿石", true);
            return;
        }
        game.herbs -= 2;
        game.ores -= 1;
        let rate = getAlchemySuccessRate();
        let roll = Math.random() * 100;
        
        if (roll < rate) {
            let gain = getAlchemyGain();
            game.cultivation = Math.min(100, game.cultivation + gain);
            addLog(`炼丹成功！修为+${gain}`, false);
            let tempChange = Math.floor(Math.random() * 5) - 2;
            game.fireTemp = Math.min(100, Math.max(0, game.fireTemp + tempChange));
        } else {
            let loss = 10 + Math.floor(Math.random() * 15);
            game.cultivation = Math.max(0, game.cultivation - loss);
            addLog(`炼丹失败！修为-${loss}`, true);
            let fluct = 8 + Math.floor(Math.random() * 12);
            game.fireTemp = Math.min(100, Math.max(0, game.fireTemp + (Math.random()>0.5 ? fluct : -fluct)));
            if (game.fireTemp > 90 && Math.random() < 0.3) {
                die("丹炉爆炸！你被烈焰吞噬，形神俱灭...");
                return;
            }
        }
        clampValues();
        updateUI();
        consumeTurn();
    }

    function explore() {
        if (game.gameOver || game.gameWin) return;
        let r = Math.random();
        
        if (r < 0.2 && !game.hasCompanion) {
            game.hasCompanion = true;
            game.companionBonus = 8;
            addLog("💕 邂逅修仙道侣！你们结为伴侣，炼丹成功率+8%", false);
            game.turnsLeft += 2;
            addLog("道侣赠予灵丹，额外获得2回合！");
            consumeTurn();
            return;
        }
        
        if (r < 0.35 && !game.hasImmortal) {
            game.hasImmortal = true;
            game.immortalBonus = 15;
            addLog("✨ 遇仙缘！仙人指点，探索收益+30%", false);
            game.cultivation = Math.min(100, game.cultivation + 12);
            addLog("修为+12");
            game.turnsLeft += 2;
            addLog("仙人赐福，增加2回合！");
            consumeTurn();
            return;
        }
        
        if (r < 0.55) {
            let herbsGain = 1 + Math.floor(Math.random() * 5);
            let oresGain = 1 + Math.floor(Math.random() * 4);
            game.herbs += herbsGain;
            game.ores += oresGain;
            addLog(`探索到灵脉！灵草+${herbsGain}，矿石+${oresGain}`);
        } 
        else if (r < 0.75) {
            let gainCult = 5 + Math.floor(Math.random() * 10);
            game.cultivation = Math.min(100, game.cultivation + gainCult);
            addLog(`顿悟天道！修为+${gainCult}`);
        }
        else if (r < 0.9) {
            let gainFire = 5 + Math.floor(Math.random() * 8);
            game.fireTemp = Math.min(100, game.fireTemp + gainFire);
            addLog(`发现地火！炉火+${gainFire}`);
        }
        else {
            addLog("探索遭遇妖兽！损失惨重", true);
            game.herbs = Math.max(0, game.herbs - 3);
            game.ores = Math.max(0, game.ores - 2);
            game.cultivation = Math.max(0, game.cultivation - 8);
            addLog("修为-8，材料损失", true);
            if (Math.random() < 0.2 && game.cultivation < 20) {
                die("被妖兽重伤，道基碎裂...");
                return;
            }
        }
        clampValues();
        updateUI();
        consumeTurn();
    }

    function adjustFire(up) {
        if (game.gameOver || game.gameWin) return;
        let delta = up ? 10 : -10;
        game.fireTemp = Math.min(100, Math.max(0, game.fireTemp + delta));
        addLog(up ? "添加灵炭，炉火+10" : "投入寒石，炉火-10");
        updateUI();
        consumeTurn();
    }

    function breakthrough() {
        if (game.gameOver || game.gameWin) return;
        if (game.cultivation < 100) {
            addLog(`修为不足${game.cultivation}/100，无法渡劫`, true);
            return;
        }
        if (game.realmIdx >= REALMS.length - 1) {
            winGame();
            return;
        }
        let deathRate = DEATH_RATES[game.realmIdx];
        if (game.hasCompanion) deathRate = Math.max(0, deathRate - 0.05);
        let roll = Math.random();
        if (roll < deathRate) {
            die(`渡劫失败！${REALMS[game.realmIdx]}突破至${REALMS[game.realmIdx+1]}时天雷噬体，神魂俱灭...`);
            return;
        }
        game.realmIdx++;
        game.cultivation = 0;
        game.fireTemp = 55;
        game.turnsLeft = TURN_LIMITS[game.realmIdx];
        if (game.hasCompanion) game.turnsLeft += 1;
        if (game.hasImmortal) game.turnsLeft += 2;
        addLog(`🎉 渡劫成功！晋升${REALMS[game.realmIdx]}！炉火重置，获得${game.turnsLeft}回合`);
        updateUI();
        consumeTurn();
    }

    function resetGame() {
        game = {
            realmIdx: 0,
            cultivation: 0,
            fireTemp: 50,
            herbs: 3,
            ores: 3,
            blood: 2,
            turnsLeft: TURN_LIMITS[0],
            gameOver: false,
            gameWin: false,
            deathCause: "",
            hasCompanion: false,
            companionBonus: 0,
            hasImmortal: false,
            immortalBonus: 0,
            totalTurnsUsed: 0
        };
        logArea.innerHTML = "> 轮回重生，天道残酷，愿此生成仙！<br>> 炉火至关重要，寻找道侣/仙缘是唯一生机。<br>> 每境回合极紧，务必精打细算。";
        updateUI();
        addLog("灵台清明，道心重燃");
        modal.classList.add("hidden");
    }

    exploreBtn.addEventListener("click", explore);
    alchemyBtn.addEventListener("click", alchemy);
    adjustFireUp.addEventListener("click", () => adjustFire(true));
    adjustFireDown.addEventListener("click", () => adjustFire(false));
    breakthroughBtn.addEventListener("click", breakthrough);
    resetBtn.addEventListener("click", resetGame);
    closeModalBtn.addEventListener("click", () => {
        modal.classList.add("hidden");
        resetGame();
    });

    resetGame();
</script>
</body>
</html>
